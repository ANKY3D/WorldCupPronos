<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pronos CDM 2026 ⚽</title>
    <meta name="description" content="Pronostics Coupe du Monde 2026 — Entre tes pronos pour tous les matchs de poules !">
    <meta name="theme-color" content="#08090b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
        }
    </script>

    <!-- ============================================ -->
    <!-- SCREEN 1: NAME ENTRY                         -->
    <!-- ============================================ -->
    <div id="screen-name" class="screen active">
        <button class="theme-toggle welcome-theme-toggle" onclick="toggleTheme()" aria-label="Changer de thème"></button>
        <div class="welcome-container">
            <div class="welcome-badge">⚽ Coupe du Monde 2026</div>
            <h1 class="welcome-title">Pronos<br><span class="gradient-text">CDM 2026</span></h1>
            <p class="welcome-subtitle">Entre ton prénom pour commencer à pronostiquer les matchs de poules !</p>
            <div class="name-card">
                <div class="name-input-wrapper">
                    <input type="text" id="name-input" placeholder="Ton prénom..." maxlength="20" autocomplete="off" spellcheck="false">
                    <button id="name-btn" onclick="handleNameSubmit()">
                        C'est parti !
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                    </button>
                </div>
                <div id="name-error" class="error-message"></div>
            </div>
            <div class="welcome-footer">
                <span class="welcome-dot"></span>
                72 matchs de poules à pronostiquer
            </div>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- SCREEN 2: PREDICTIONS                        -->
    <!-- ============================================ -->
    <div id="screen-pronos" class="screen">
        <!-- Sticky header -->
        <div class="pronos-header" id="pronos-header">
            <div class="pronos-header-top">
                <button class="back-btn" onclick="goBackToName()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <div class="pronos-title">
                    <span id="player-greeting"></span>
                </div>
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="Changer de thème"></button>
            </div>
            <!-- Progress bar -->
            <div class="progress-wrapper">
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <span class="progress-text" id="progress-text">0 / 72</span>
            </div>
            
            <!-- Phase Navigation -->
            <div class="phase-nav-container">
                <div class="phase-nav">
                    <button class="phase-nav-btn active" onclick="scrollToPhase('poules')">Poules</button>
                    <button class="phase-nav-btn" onclick="scrollToPhase('16emes')">16èmes</button>
                    <button class="phase-nav-btn" disabled>8èmes</button>
                    <button class="phase-nav-btn" disabled>Quarts</button>
                    <button class="phase-nav-btn" disabled>Demis</button>
                    <button class="phase-nav-btn" disabled>3ème place</button>
                    <button class="phase-nav-btn" disabled>Finale</button>
                </div>
            </div>
        </div>

        <!-- Match content -->
        <div class="pronos-content" id="pronos-content"></div>
    </div>

    <!-- Firebase SDK (compat for vanilla JS) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
